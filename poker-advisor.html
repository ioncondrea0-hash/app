<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PokerEye AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
  :root {
    --bg: #070e0b; --surface: #101a15; --surface2: #172118;
    --felt: #0d3b2e; --gold: #c9a84c; --neon: #00ffa3;
    --danger: #ff4757; --warn: #ffa502; --muted: #4a7060;
    --text: #e0f0e8; --border: rgba(201,168,76,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; }
  header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--surface); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:50; }
  .logo { font-size:17px; font-weight:700; }
  .logo span{color:var(--gold)} .logo em{color:var(--neon);font-style:normal}
  .auto-toggle { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); border-radius:20px; padding:7px 14px; cursor:pointer; font-size:13px; font-weight:700; color:var(--muted); transition:all 0.2s; -webkit-user-select:none; user-select:none; }
  .auto-toggle.active{border-color:var(--neon);color:var(--neon);background:rgba(0,255,163,0.08)}
  .pulse-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background 0.2s;flex-shrink:0}
  .auto-toggle.active .pulse-dot{background:var(--neon);box-shadow:0 0 8px var(--neon);animation:pulse 1.2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.7)}}
  .start-cam-btn{width:100%;padding:30px;background:var(--surface);border:2px dashed var(--border);color:var(--muted);font-size:15px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:10px}
  .start-cam-btn span{font-size:40px}
  .cam-wrap{position:relative;width:100%;background:#000;overflow:hidden}
  #videoEl{width:100%;display:block;max-height:48vh;object-fit:cover}
  #canvasEl{display:none}
  .cam-overlay{position:absolute;inset:0;pointer-events:none}
  .bracket{position:absolute;width:28px;height:28px;border-color:var(--neon);border-style:solid;opacity:0.8}
  .bracket.tl{top:10px;left:10px;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
  .bracket.tr{top:10px;right:10px;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
  .bracket.bl{bottom:10px;left:10px;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
  .bracket.br{bottom:10px;right:10px;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
  .scanline{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--neon),transparent);opacity:0;top:0}
  .scanline.on{opacity:1;animation:scanMove 2s linear infinite}
  @keyframes scanMove{0%{top:5%}100%{top:95%}}
  .cam-status{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--gold);letter-spacing:1px;background:rgba(0,0,0,0.6);padding:3px 10px;border-radius:10px}
  .countdown-wrap{position:absolute;bottom:10px;right:10px;width:44px;height:44px;display:none}
  .countdown-wrap.on{display:block}
  .countdown-svg{width:44px;height:44px;transform:rotate(-90deg)}
  .countdown-circle{fill:none;stroke:var(--neon);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 0.9s linear}
  .countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:var(--neon);font-family:'JetBrains Mono',monospace}
  .advice-card{margin:12px;background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
  .action-bar{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
  .action-badge{font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:7px 16px;border-radius:10px;letter-spacing:1px;min-width:110px;text-align:center}
  .badge-fold{background:rgba(255,71,87,0.15);color:var(--danger);border:2px solid var(--danger)}
  .badge-call{background:rgba(255,165,2,0.15);color:var(--warn);border:2px solid var(--warn)}
  .badge-raise{background:rgba(0,255,163,0.12);color:var(--neon);border:2px solid var(--neon)}
  .badge-check{background:rgba(255,255,255,0.07);color:#ccc;border:2px solid #444}
  .badge-wait{background:var(--surface2);color:var(--muted);border:2px dashed var(--border);font-size:13px}
  .equity-mini{text-align:right}
  .equity-mini .pct{font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--neon)}
  .equity-mini .lbl{font-size:10px;color:var(--muted)}
  .advice-text{padding:12px 14px;font-size:13px;line-height:1.65;color:var(--text);min-height:70px}
  .advice-text.loading{color:var(--muted);display:flex;align-items:center;gap:10px}
  .cards-strip{padding:8px 14px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-top:1px solid var(--border)}
  .strip-lbl{font-size:10px;color:var(--muted);margin-right:4px;font-family:'JetBrains Mono',monospace}
  .mini-card{display:inline-flex;flex-direction:column;align-items:center;width:30px;height:42px;border-radius:5px;font-size:11px;font-weight:700;justify-content:center;gap:1px}
  .mini-card.red{background:#fff;color:#c0392b}.mini-card.black{background:#fff;color:#111}
  .mini-card.unk{background:var(--surface2);color:var(--muted);border:1px dashed var(--border);font-size:15px}
  .csep{width:1px;height:36px;background:var(--border);margin:0 4px}
  .err-box{margin:0 12px 12px;padding:12px 14px;background:rgba(255,71,87,0.1);border:1px solid var(--danger);border-radius:12px;font-size:12px;color:var(--danger);display:none;word-break:break-all}
  .manual-section{padding:0 12px 12px}
  .section-lbl{font-size:10px;letter-spacing:1.5px;color:var(--gold);font-family:'JetBrains Mono',monospace;padding:10px 0 8px;text-transform:uppercase}
  .cards-row{display:flex;gap:7px;flex-wrap:wrap}
  .card-slot{width:40px;height:54px;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;flex-shrink:0}
  .card-slot.red{background:#fff;color:#c0392b;border-color:#ddd}
  .card-slot.black{background:#fff;color:#111;border-color:#ddd}
  .card-slot.empty{background:var(--surface2);border:2px dashed var(--border);color:var(--muted);font-size:20px}
  .params-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 12px 12px}
  .param-cell{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 10px}
  .param-cell label{font-size:10px;color:var(--muted);display:block;margin-bottom:3px}
  .param-cell input,.param-cell select{background:transparent;border:none;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:600;width:100%;outline:none}
  .param-cell select option{background:#111}
  .street-row{display:flex;gap:6px;padding:0 12px 12px}
  .stab{flex:1;padding:7px 4px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer}
  .stab.active{background:var(--felt);border-color:var(--gold);color:var(--gold)}
  .dots{display:inline-flex;gap:4px}
  .dots span{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:dot 0.8s ease-in-out infinite}
  .dots span:nth-child(2){animation-delay:.15s}.dots span:nth-child(3){animation-delay:.3s}
  @keyframes dot{0%,80%,100%{transform:translateY(0);opacity:.4}40%{transform:translateY(-5px);opacity:1}}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--gold);color:var(--text);padding:9px 18px;border-radius:20px;font-size:12px;z-index:999;white-space:nowrap;pointer-events:none;animation:toastIn 0.25s ease}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
  .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);z-index:200;align-items:flex-end}
  .modal-bg.open{display:flex}
  .modal{width:100%;background:var(--surface);border-radius:20px 20px 0 0;padding:18px 14px 40px}
  .modal-title{font-size:13px;font-weight:600;color:var(--gold);margin-bottom:12px;text-align:center}
  .suit-row{display:flex;gap:6px;margin-bottom:10px}
  .suit-btn{flex:1;padding:10px;border-radius:10px;font-size:22px;text-align:center;background:var(--surface2);border:2px solid var(--border);cursor:pointer}
  .suit-btn.sel{border-color:var(--gold);background:var(--felt)}
  .rank-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:12px}
  .rank-btn{padding:9px 2px;text-align:center;border-radius:8px;font-size:13px;font-weight:700;background:var(--surface2);border:2px solid var(--border);cursor:pointer;color:var(--text)}
  .rank-btn.sel{border-color:var(--neon);background:rgba(0,255,163,.1);color:var(--neon)}
  .modal-btns{display:flex;gap:8px}
  .mbtn{flex:1;padding:13px;border-radius:10px;border:none;font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:600;cursor:pointer}
  .mbtn.ok{background:var(--gold);color:#000}
  .mbtn.cancel{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
</style>
</head>
<body>

<header>
  <div class="logo">Poker<span>Eye</span> <em>AI</em></div>
  <div class="auto-toggle" id="autoToggle" onclick="toggleAuto()">
    <div class="pulse-dot"></div>
    <span id="autoLabel">АВТО</span>
  </div>
</header>

<div id="camPlaceholder" class="start-cam-btn" onclick="startCam()">
  <span>📷</span>Включить камеру
</div>
<div class="cam-wrap" id="camWrap" style="display:none">
  <video id="videoEl" autoplay playsinline muted></video>
  <canvas id="canvasEl"></canvas>
  <div class="cam-overlay">
    <div class="bracket tl"></div><div class="bracket tr"></div>
    <div class="bracket bl"></div><div class="bracket br"></div>
    <div class="scanline" id="scanLine"></div>
    <div class="cam-status" id="camStatus">НАВЕДИ НА СТОЛ</div>
  </div>
  <div class="countdown-wrap" id="cdWrap">
    <svg class="countdown-svg" viewBox="0 0 44 44">
      <circle cx="22" cy="22" r="18" fill="none" stroke="#172118" stroke-width="3"/>
      <circle class="countdown-circle" id="cdCircle" cx="22" cy="22" r="18"/>
    </svg>
    <div class="countdown-num" id="cdNum">5</div>
  </div>
</div>

<div class="err-box" id="errBox"></div>

<div class="advice-card">
  <div class="action-bar">
    <div class="action-badge badge-wait" id="actionBadge">ОЖИДАНИЕ</div>
    <div style="flex:1"></div>
    <div class="equity-mini" id="equityMini" style="display:none">
      <div class="pct" id="equityPct">0%</div>
      <div class="lbl">equity</div>
    </div>
  </div>
  <div class="advice-text" id="adviceText">
    Включи камеру → нажми <strong style="color:var(--gold)">АВТО</strong> — AI анализирует стол каждые 5 секунд.
  </div>
  <div class="cards-strip" id="cardsStrip" style="display:none"></div>
</div>

<div class="street-row" style="margin-top:12px">
  <div class="stab active" onclick="setStreet('preflop',this)">Префлоп</div>
  <div class="stab" onclick="setStreet('flop',this)">Флоп</div>
  <div class="stab" onclick="setStreet('turn',this)">Тёрн</div>
  <div class="stab" onclick="setStreet('river',this)">Ривер</div>
</div>

<div class="manual-section">
  <div class="section-lbl">Моя рука (тап чтобы изменить)</div>
  <div class="cards-row" id="holeRow"></div>
</div>
<div class="manual-section" id="boardManual" style="display:none">
  <div class="section-lbl">Борд</div>
  <div class="cards-row" id="boardRow"></div>
</div>

<div class="params-grid">
  <div class="param-cell"><label>Банк (BB)</label><input id="pot" type="number" value="6" inputmode="numeric"></div>
  <div class="param-cell"><label>Ставка ко мне (BB)</label><input id="bet" type="number" value="0" inputmode="numeric"></div>
  <div class="param-cell"><label>Позиция</label>
    <select id="pos"><option>UTG</option><option>UTG+1</option><option>MP</option><option>HJ</option><option>CO</option><option selected>BTN</option><option>SB</option><option>BB</option></select>
  </div>
  <div class="param-cell"><label>Игроков</label>
    <select id="players"><option>2</option><option>3</option><option>4</option><option>5</option><option selected>6</option><option>7</option><option>8</option><option>9</option></select>
  </div>
  <div class="param-cell"><label>Стек (BB)</label><input id="stack" type="number" value="100" inputmode="numeric"></div>
  <div class="param-cell"><label>Формат</label>
    <select id="gameStage"><option selected value="cash">Кэш</option><option value="early">Турнир</option><option value="bubble">Пузырь</option><option value="ft">Финальный стол</option></select>
  </div>
</div>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="modal-title">Выбери карту</div>
    <div class="suit-row">
      <div class="suit-btn" data-s="♠" onclick="pickSuit(this)">♠</div>
      <div class="suit-btn" data-s="♥" onclick="pickSuit(this)" style="color:#c0392b">♥</div>
      <div class="suit-btn" data-s="♦" onclick="pickSuit(this)" style="color:#c0392b">♦</div>
      <div class="suit-btn" data-s="♣" onclick="pickSuit(this)">♣</div>
    </div>
    <div class="rank-grid">
      <div class="rank-btn" onclick="pickRank(this)">A</div><div class="rank-btn" onclick="pickRank(this)">K</div>
      <div class="rank-btn" onclick="pickRank(this)">Q</div><div class="rank-btn" onclick="pickRank(this)">J</div>
      <div class="rank-btn" onclick="pickRank(this)">T</div><div class="rank-btn" onclick="pickRank(this)">9</div>
      <div class="rank-btn" onclick="pickRank(this)">8</div><div class="rank-btn" onclick="pickRank(this)">7</div>
      <div class="rank-btn" onclick="pickRank(this)">6</div><div class="rank-btn" onclick="pickRank(this)">5</div>
      <div class="rank-btn" onclick="pickRank(this)">4</div><div class="rank-btn" onclick="pickRank(this)">3</div>
      <div class="rank-btn" onclick="pickRank(this)">2</div>
    </div>
    <div class="modal-btns">
      <button class="mbtn cancel" onclick="closeModal()">Отмена</button>
      <button class="mbtn ok" onclick="confirmCard()">✓ OK</button>
    </div>
  </div>
</div>

<div style="height:40px"></div>

<script>
const PROXY = 'https://cold-king-654b.ioncondrea0.workers.dev';

const S = {
  street:'preflop', hole:[null,null], board:[],
  boardSlots:{preflop:0,flop:3,turn:4,river:5},
  autoMode:false, analyzing:false, stream:null,
  cdInterval:null, INTERVAL:5,
  picker:{type:null,idx:null,suit:null,rank:null}
};
const RED=['♥','♦'];
const CIRC = 2 * Math.PI * 18;

async function callGemini(prompt, b64Image) {
  const parts = [];
  if (b64Image) {
    parts.push({ inline_data: { mime_type: 'image/jpeg', data: b64Image } });
  }
  parts.push({ text: prompt });

  const body = {
    contents: [{ parts }],
    generationConfig: { temperature: 0.2, maxOutputTokens: 800 }
  };

  const resp = await fetch(PROXY, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const errText = await resp.text();
    throw new Error('HTTP ' + resp.status + ': ' + errText.slice(0, 100));
  }

  const data = await resp.json();

  // Log full response for debugging
  console.log('Gemini response:', JSON.stringify(data).slice(0, 500));

  // Handle Gemini response format
  if (data.error) throw new Error(data.error.message || 'Gemini error');
  
  const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error('Пустой ответ от Gemini: ' + JSON.stringify(data).slice(0, 200));
  
  return text;
}

async function startCam() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ideal:'environment'}, width:{ideal:1280} }
    });
    S.stream = stream;
    document.getElementById('videoEl').srcObject = stream;
    document.getElementById('camPlaceholder').style.display = 'none';
    document.getElementById('camWrap').style.display = 'block';
    toast('📷 Камера включена — нажми АВТО');
  } catch(e) {
    showErr('Камера: ' + e.message);
  }
}

function toggleAuto() {
  if (!S.stream) { toast('Сначала включи камеру'); return; }
  S.autoMode = !S.autoMode;
  const btn = document.getElementById('autoToggle');
  if (S.autoMode) {
    btn.classList.add('active');
    document.getElementById('autoLabel').textContent = 'АВТО ВКЛ';
    document.getElementById('scanLine').classList.add('on');
    document.getElementById('cdWrap').classList.add('on');
    hideErr();
    startCountdown();
  } else {
    btn.classList.remove('active');
    document.getElementById('autoLabel').textContent = 'АВТО';
    document.getElementById('scanLine').classList.remove('on');
    document.getElementById('cdWrap').classList.remove('on');
    clearInterval(S.cdInterval);
  }
}

function startCountdown() {
  let rem = S.INTERVAL;
  updateCD(rem);
  runScan();
  S.cdInterval = setInterval(() => {
    rem--;
    if (rem <= 0) { rem = S.INTERVAL; if (!S.analyzing) runScan(); }
    updateCD(rem);
  }, 1000);
}

function updateCD(sec) {
  const offset = CIRC * (1 - sec / S.INTERVAL);
  const el = document.getElementById('cdCircle');
  el.style.strokeDasharray = CIRC;
  el.style.strokeDashoffset = offset;
  document.getElementById('cdNum').textContent = sec;
}

async function runScan() {
  if (S.analyzing) return;
  S.analyzing = true;
  document.getElementById('camStatus').textContent = 'АНАЛИЗИРУЮ...';
  const vid = document.getElementById('videoEl');
  const canvas = document.getElementById('canvasEl');
  canvas.width = vid.videoWidth || 640;
  canvas.height = vid.videoHeight || 480;
  canvas.getContext('2d').drawImage(vid, 0, 0);
  const b64 = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
  await doAnalyze(b64);
  document.getElementById('camStatus').textContent = 'СЛЕЖУ ЗА СТОЛОМ';
  S.analyzing = false;
}

async function doAnalyze(b64Image) {
  showLoading();
  const pot   = document.getElementById('pot').value   || 6;
  const bet   = document.getElementById('bet').value   || 0;
  const pos   = document.getElementById('pos').value;
  const plrs  = document.getElementById('players').value;
  const stack = document.getElementById('stack').value || 100;
  const stage = document.getElementById('gameStage').value;
  const manualHole  = S.hole.filter(Boolean).map(c=>c.rank+c.suit).join(' ');
  const manualBoard = S.board.map(c=>c.rank+c.suit).join(' ');

  const prompt = `Ты покерный тренер (Texas Hold'em No-Limit).
${b64Image ? 'Смотри на изображение покерного стола и распознай карты.' : ''}
${manualHole ? 'Карты игрока: ' + manualHole : ''}
${manualBoard ? 'Борд: ' + manualBoard : ''}

Параметры: стрит=${S.street}, позиция=${pos}, игроков=${plrs}, банк=${pot}BB, ставка=${bet}BB, стек=${stack}BB, формат=${stage}

ВАЖНО: Ответь СТРОГО только валидным JSON объектом. Никакого текста до или после. Никаких markdown блоков. Только JSON:
{"holeCards":["Ah","Kd"],"boardCards":[],"cardsConfidence":0.8,"action":"FOLD","sizing":null,"equity":0.55,"reason":"Объяснение на русском.","tip":"Совет."}`;

  try {
    const raw = await callGemini(prompt, b64Image);
    console.log('Raw response:', raw.slice(0, 300));
    
    // Try multiple JSON extraction methods
    let res = null;
    
    // Method 1: direct parse
    try { res = JSON.parse(raw.trim()); } catch(e) {}
    
    // Method 2: extract JSON object
    if (!res) {
      const match = raw.match(/\{[^{}]*\}/s) || raw.match(/\{[\s\S]*\}/);
      if (match) try { res = JSON.parse(match[0]); } catch(e) {}
    }
    
    // Method 3: remove markdown and retry
    if (!res) {
      const clean = raw.replace(/```json/g,'').replace(/```/g,'').trim();
      try { res = JSON.parse(clean); } catch(e) {}
    }

    if (!res) throw new Error('Не удалось разобрать ответ: ' + raw.slice(0, 150));

    if (res.holeCards?.length === 2 && (res.cardsConfidence||0) > 0.5) {
      const p = res.holeCards.map(parseCard).filter(Boolean);
      if (p.length === 2) S.hole = p;
    }
    if (res.boardCards?.length > 0 && (res.cardsConfidence||0) > 0.5) {
      const p = res.boardCards.slice(0, S.boardSlots[S.street]).map(parseCard).filter(Boolean);
      if (p.length) S.board = p;
    }
    renderCards();
    showAdvice(res);
    hideErr();
  } catch(e) {
    console.error(e);
    showErr(e.message);
    resetAdvice();
  }
}

function parseCard(code) {
  if (!code || code.length < 2) return null;
  const r = code[0].toUpperCase();
  const sMap = {h:'♥',d:'♦',c:'♣',s:'♠'};
  const s = sMap[code[1].toLowerCase()];
  if (!'AKQJT98765432'.includes(r) || !s) return null;
  return { rank:r, suit:s, red:RED.includes(s) };
}

function showLoading() {
  document.getElementById('actionBadge').className = 'action-badge badge-wait';
  document.getElementById('actionBadge').textContent = '...';
  document.getElementById('adviceText').className = 'advice-text loading';
  document.getElementById('adviceText').innerHTML = '<div class="dots"><span></span><span></span><span></span></div>&nbsp;Анализирую...';
  document.getElementById('equityMini').style.display = 'none';
}
function resetAdvice() {
  document.getElementById('actionBadge').className = 'action-badge badge-wait';
  document.getElementById('actionBadge').textContent = 'ОШИБКА';
  document.getElementById('adviceText').className = 'advice-text';
  document.getElementById('adviceText').textContent = 'Смотри детали ошибки выше.';
}
function showAdvice(res) {
  const MAP = {
    FOLD:{cls:'badge-fold',label:'✕ FOLD'},
    CALL:{cls:'badge-call',label:'✓ CALL'},
    RAISE:{cls:'badge-raise',label:'↑ RAISE'},
    CHECK:{cls:'badge-check',label:'— CHECK'}
  };
  const a = MAP[res.action] || {cls:'badge-check', label: res.action||'?'};
  document.getElementById('actionBadge').className = 'action-badge ' + a.cls;
  document.getElementById('actionBadge').textContent = a.label;
  let html = `<p>${res.reason||''}</p>`;
  if (res.sizing) html += `<p style="margin-top:8px;color:var(--gold);font-size:12px">💰 ${res.sizing}</p>`;
  if (res.tip)    html += `<p style="margin-top:8px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);padding-top:8px">🎯 ${res.tip}</p>`;
  document.getElementById('adviceText').className = 'advice-text';
  document.getElementById('adviceText').innerHTML = html;
  if (res.equity != null) {
    document.getElementById('equityPct').textContent = Math.round(res.equity*100)+'%';
    document.getElementById('equityMini').style.display = 'block';
  }
  renderStrip();
}

function renderStrip() {
  const strip = document.getElementById('cardsStrip');
  const all = [...S.hole.filter(Boolean), ...S.board.filter(Boolean)];
  if (!all.length) { strip.style.display='none'; return; }
  strip.style.display = 'flex';
  strip.innerHTML = '<span class="strip-lbl">КАРТЫ:</span>';
  S.hole.forEach(c => {
    const el = document.createElement('div');
    if (c) { el.className=`mini-card ${c.red?'red':'black'}`; el.innerHTML=`<div>${c.rank}</div><div>${c.suit}</div>`; }
    else   { el.className='mini-card unk'; el.textContent='?'; }
    strip.appendChild(el);
  });
  if (S.board.length) {
    const sep=document.createElement('div'); sep.className='csep'; strip.appendChild(sep);
    S.board.forEach(c => {
      const el=document.createElement('div');
      el.className=`mini-card ${c.red?'red':'black'}`;
      el.innerHTML=`<div>${c.rank}</div><div>${c.suit}</div>`;
      strip.appendChild(el);
    });
  }
}

function showErr(msg) { const b=document.getElementById('errBox'); b.textContent='⚠️ '+msg; b.style.display='block'; }
function hideErr() { document.getElementById('errBox').style.display='none'; }

function setStreet(s, el) {
  S.street = s;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  S.board = S.board.slice(0, S.boardSlots[s]);
  document.getElementById('boardManual').style.display = s==='preflop'?'none':'block';
  renderCards();
}
function renderCards() {
  const hr = document.getElementById('holeRow');
  hr.innerHTML = '';
  for(let i=0;i<2;i++) {
    const c=S.hole[i], el=document.createElement('div');
    if(c){el.className=`card-slot ${c.red?'red':'black'}`;el.innerHTML=`<div>${c.rank}</div><div style="font-size:11px">${c.suit}</div>`;}
    else{el.className='card-slot empty';el.textContent='+';}
    el.onclick=()=>openPicker('hole',i); hr.appendChild(el);
  }
  const slots=S.boardSlots[S.street], br=document.getElementById('boardRow');
  br.innerHTML='';
  for(let i=0;i<slots;i++){
    const c=S.board[i],el=document.createElement('div');
    if(c){el.className=`card-slot ${c.red?'red':'black'}`;el.innerHTML=`<div>${c.rank}</div><div style="font-size:11px">${c.suit}</div>`;}
    else{el.className='card-slot empty';el.textContent='+';}
    el.onclick=()=>openPicker('board',i); br.appendChild(el);
  }
}

function openPicker(type,idx){S.picker={type,idx,suit:null,rank:null};document.querySelectorAll('.suit-btn').forEach(b=>b.classList.remove('sel'));document.querySelectorAll('.rank-btn').forEach(b=>b.classList.remove('sel'));document.getElementById('modalBg').classList.add('open');}
function closeModal(){document.getElementById('modalBg').classList.remove('open');}
function pickSuit(el){document.querySelectorAll('.suit-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');S.picker.suit=el.dataset.s;}
function pickRank(el){document.querySelectorAll('.rank-btn').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');S.picker.rank=el.textContent;}
function confirmCard(){
  if(!S.picker.suit||!S.picker.rank){toast('Выбери масть и ранг');return;}
  const c={rank:S.picker.rank,suit:S.picker.suit,red:RED.includes(S.picker.suit)};
  if(S.picker.type==='hole')S.hole[S.picker.idx]=c; else S.board[S.picker.idx]=c;
  renderCards(); closeModal();
  if(!S.autoMode){S.analyzing=false;doAnalyze(null);}
}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target===document.getElementById('modalBg'))closeModal();});
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);}

renderCards();
</script>
</body>
</html>
