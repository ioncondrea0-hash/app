<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MTT GTO Тренажёр</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"/>
<style>
  :root{
    --felt:#15302b; --feltDeep:#0f2420; --brass:#c2a05a; --brassDim:#8f7838;
    --cream:#e8e4d8; --line:#2c4a42; --red:#d6584a; --green:#5bbf8a; --muted:#8aa39a;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; color:var(--cream);
    font-family:'Inter',system-ui,sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, var(--felt) 0%, var(--feltDeep) 70%);
    padding:clamp(16px,4vw,40px);
  }
  .wrap{max-width:760px; margin:0 auto;}
  h1{margin:0; font-family:'JetBrains Mono',monospace; font-weight:700; font-size:clamp(22px,4vw,30px); letter-spacing:-0.5px;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .head{display:flex; align-items:baseline; justify-content:space-between; flex-wrap:wrap; gap:12px; margin-bottom:6px;}
  .fmtbox{display:flex; border:1px solid var(--line); border-radius:8px; overflow:hidden;}
  .fmtbtn{background:transparent; color:var(--muted); border:none; padding:6px 14px; cursor:pointer; font-weight:600; font-size:13px; font-family:'JetBrains Mono',monospace;}
  .fmtbtn.active{background:var(--brass); color:var(--feltDeep);}
  .sub{margin:0 0 20px; color:var(--muted); font-size:13px; line-height:1.5;}
  .card{background:rgba(15,36,32,.8); border:1px solid var(--line); border-radius:12px; padding:16px; margin-bottom:16px;}
  .lbl{font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-bottom:6px;}
  select{background:var(--felt); color:var(--cream); border:1px solid var(--line); border-radius:6px; padding:8px 10px; font-size:16px; font-family:'JetBrains Mono',monospace; font-weight:700; cursor:pointer;}
  input[type=text]{width:100%; background:var(--felt); color:var(--cream); border:1px solid var(--line); border-radius:8px; padding:10px 12px; font-size:14px;}
  input[type=range]{width:100%;}
  .tabs{display:flex; gap:4px; margin-bottom:16px; flex-wrap:wrap;}
  .tab{background:transparent; border:1px solid var(--line); color:var(--muted); padding:8px 14px; border-radius:8px; cursor:pointer; font-weight:600; font-size:13px;}
  .tab.active{background:var(--felt); border-color:var(--brass); color:var(--cream);}
  .row{margin-bottom:12px;}
  .chip{background:transparent; color:var(--muted); border:1px solid var(--line); border-radius:6px; padding:6px 12px; cursor:pointer; font-weight:700; font-size:13px; font-family:'JetBrains Mono',monospace; margin-right:4px; margin-bottom:4px;}
  .chip.active{background:var(--brass); color:var(--feltDeep); border-color:var(--brass);}
  .cta{margin-top:6px; background:var(--brass); color:var(--feltDeep); border:none; border-radius:8px; padding:11px 18px; font-weight:700; font-size:14px; cursor:pointer; font-family:'JetBrains Mono',monospace;}
  .cta:disabled{opacity:.4; cursor:not-allowed;}
  .matrix{display:grid; grid-template-columns:repeat(13,1fr); gap:2px; max-width:100%;}
  .cell{aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:clamp(6px,1.3vw,9px); font-family:'JetBrains Mono',monospace; font-weight:700; border-radius:2px;}
  .foot{margin-top:24px; padding-top:14px; border-top:1px solid var(--line); color:var(--muted); font-size:11px; line-height:1.6;}
  .result{margin-top:14px; padding:14px; border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useMemo,useCallback}=React;

const RANKS=["2","3","4","5","6","7","8","9","T","J","Q","K","A"];
const SUITS=["s","h","d","c"];
const SUIT_SYM={s:"♠",h:"♥",d:"♦",c:"♣"};
const SUIT_COLOR={s:"#e8e4d8",h:"#d6584a",d:"#d6584a",c:"#e8e4d8"};
const RANK_VAL=Object.fromEntries(RANKS.map((r,i)=>[r,i+2]));
const MROWS=["A","K","Q","J","T","9","8","7","6","5","4","3","2"];

function fullDeck(){const d=[];for(const r of RANKS)for(const s of SUITS)d.push(r+s);return d;}

function eval7(cards){
  const vals=cards.map(c=>RANK_VAL[c[0]]);const suits=cards.map(c=>c[1]);
  const vcount={};for(const v of vals)vcount[v]=(vcount[v]||0)+1;
  const scount={};for(const s of suits)scount[s]=(scount[s]||0)+1;
  let flushSuit=null;for(const s in scount)if(scount[s]>=5)flushSuit=s;
  let flushVals=null;
  if(flushSuit)flushVals=cards.filter(c=>c[1]===flushSuit).map(c=>RANK_VAL[c[0]]).sort((a,b)=>b-a);
  const straightHigh=(vset)=>{const present=new Set(vset);if(present.has(14))present.add(1);
    let run=0,best=0;for(let v=14;v>=1;v--){if(present.has(v)){run++;if(run>=5){best=v+4;break;}}else run=0;}return best;};
  if(flushSuit){const sf=straightHigh(cards.filter(c=>c[1]===flushSuit).map(c=>RANK_VAL[c[0]]));if(sf)return 8000000+sf;}
  const groups=Object.entries(vcount).map(([v,c])=>[parseInt(v),c]);
  const byCount=(n)=>groups.filter(g=>g[1]===n).map(g=>g[0]).sort((a,b)=>b-a);
  const quads=byCount(4),trips=byCount(3),pairs=byCount(2);
  if(quads.length){const kick=Math.max(...vals.filter(v=>v!==quads[0]));return 7000000+quads[0]*100+kick;}
  if(trips.length&&(pairs.length||trips.length>1)){const t=trips[0];const pair=trips.length>1?Math.max(...trips.slice(1)):pairs[0];return 6000000+t*100+pair;}
  if(flushVals)return 5000000+flushVals.slice(0,5).reduce((a,v,i)=>a+v*Math.pow(15,4-i),0);
  const st=straightHigh(vals);if(st)return 4000000+st;
  if(trips.length){const kick=vals.filter(v=>v!==trips[0]).sort((a,b)=>b-a).slice(0,2);return 3000000+trips[0]*10000+kick[0]*100+(kick[1]||0);}
  if(pairs.length>=2){const[p1,p2]=pairs.slice(0,2);const kick=Math.max(...vals.filter(v=>v!==p1&&v!==p2));return 2000000+p1*10000+p2*100+kick;}
  if(pairs.length===1){const kick=vals.filter(v=>v!==pairs[0]).sort((a,b)=>b-a).slice(0,3);return 1000000+pairs[0]*10000+kick[0]*100+kick[1]*10+(kick[2]||0);}
  const hi=[...vals].sort((a,b)=>b-a).slice(0,5);return hi.reduce((a,v,i)=>a+v*Math.pow(15,4-i),0);
}

function equityMC(hero,vc,board,iters){
  const known=new Set([...hero,...board]);let win=0,tie=0;
  for(let it=0;it<iters;it++){const deck=fullDeck().filter(c=>!known.has(c));
    for(let i=deck.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[deck[i],deck[j]]=[deck[j],deck[i]];}
    let di=0;const b=[...board];while(b.length<5)b.push(deck[di++]);
    const hs=eval7([...hero,...b]);let tied=false,lost=false;
    for(let v=0;v<vc;v++){const vh=[deck[di++],deck[di++]];const vs=eval7([...vh,...b]);if(vs>hs){lost=true;break;}if(vs===hs)tied=true;}
    if(lost)continue;if(tied)tie++;else win++;}
  return (win+tie*0.5)/iters;
}

function pushEV(hero,stackBB,pCall){
  const eq=equityMC(hero,1,[],1500);
  const potIfFold=1.5;const potIfCall=1.5+stackBB;
  const evCall=eq*potIfCall-(1-eq)*stackBB;
  const ev=(1-pCall)*potIfFold+pCall*evCall;
  return {ev,eq};
}

const RFI={
  "9max":{
    UTG:"22+ ATs+ KTs+ QTs+ JTs T9s 98s 87s AJo+ KQo".split(" "),
    MP:"22+ A9s+ KTs+ QTs+ J9s+ T9s 98s 87s 76s ATo+ KJo+ QJo".split(" "),
    CO:"22+ A2s+ K9s+ Q9s+ J9s+ T8s+ 97s+ 86s+ 76s 65s 54s A9o+ KTo+ QTo+ JTo".split(" "),
    BTN:"22+ A2s+ K5s+ Q7s+ J7s+ T7s+ 96s+ 85s+ 74s+ 64s+ 53s+ A2o+ K9o+ Q9o+ J9o+ T9o".split(" "),
    SB:"22+ A2s+ K7s+ Q8s+ J8s+ T8s+ 97s+ 86s+ 75s+ 65s 54s A7o+ K9o+ Q9o+ JTo".split(" "),
  },
  "6max":{
    UTG:"22+ A8s+ KTs+ QTs+ J9s+ T9s 98s 87s 76s ATo+ KJo+ QJo".split(" "),
    MP:"22+ A5s+ K9s+ Q9s+ J9s+ T8s+ 97s+ 86s+ 76s 65s 54s ATo+ KTo+ QTo+ JTo".split(" "),
    CO:"22+ A2s+ K8s+ Q8s+ J8s+ T8s+ 97s+ 86s+ 75s+ 65s 54s A9o+ KTo+ QTo+ JTo".split(" "),
    BTN:"22+ A2s+ K2s+ Q5s+ J7s+ T7s+ 96s+ 85s+ 74s+ 64s+ 53s+ A2o+ K8o+ Q9o+ J9o+ T9o".split(" "),
    SB:"22+ A2s+ K6s+ Q8s+ J8s+ T8s+ 97s+ 86s+ 75s+ 65s 54s A7o+ K9o+ QTo+ JTo".split(" "),
  }
};

function expandToken(tok){
  const out=new Set();
  if(tok.endsWith("+")){const base=tok.slice(0,-1);
    if(base.length===2&&base[0]===base[1]){const start=RANKS.indexOf(base[0]);for(let i=start;i<RANKS.length;i++)out.add(RANKS[i]+RANKS[i]);}
    else{const hi=base[0],lo=base[1],suff=base[2];const hiV=RANKS.indexOf(hi),loStart=RANKS.indexOf(lo);for(let i=loStart;i<hiV;i++)out.add(hi+RANKS[i]+suff);}}
  else out.add(tok);
  return out;
}
function buildRangeSet(tokens){const s=new Set();for(const t of tokens)for(const h of expandToken(t))s.add(h);return s;}
function handKey(r1,r2,suited){if(r1===r2)return r1+r2;const hi=RANK_VAL[r1]>=RANK_VAL[r2]?r1:r2;const lo=hi===r1?r2:r1;return hi+lo+(suited?"s":"o");}

const POSITIONS=["UTG","MP","CO","BTN","SB"];

function CardPip({card}){
  if(!card)return null;const r=card[0],s=card[1];
  return <span className="mono" style={{display:"inline-flex",alignItems:"center",gap:2,fontWeight:700,color:SUIT_COLOR[s],fontSize:"1.05em"}}>{r==="T"?"10":r}<span>{SUIT_SYM[s]}</span></span>;
}

function RangeMatrix({rangeSet,hero}){
  const [hr1,hr2,suited]=hero;
  const heroKey=hr1===hr2?hr1+hr2:handKey(hr1,hr2,suited);
  const cells=[];
  MROWS.forEach((rr,i)=>MROWS.forEach((rc,j)=>{
    let label,key;
    if(i===j){label=rr+rr;key=rr+rr;}
    else if(i<j){const hi=RANK_VAL[rr]>=RANK_VAL[rc]?rr:rc,lo=hi===rr?rc:rr;label=hi+lo+"s";key=hi+lo+"s";}
    else{const hi=RANK_VAL[rr]>=RANK_VAL[rc]?rr:rc,lo=hi===rr?rc:rr;label=hi+lo+"o";key=hi+lo+"o";}
    const inR=rangeSet.has(key);const isHero=key===heroKey;
    cells.push(<div key={i+"-"+j} className="cell" title={label} style={{
      background:isHero?"var(--brass)":inR?"rgba(91,191,138,.33)":"var(--feltDeep)",
      color:isHero?"var(--feltDeep)":inR?"var(--cream)":"rgba(138,163,154,.5)",
      border:isHero?"1px solid var(--cream)":"1px solid rgba(44,74,66,.33)"
    }}>{label}</div>);
  }));
  return <div className="matrix">{cells}</div>;
}

function App(){
  const [format,setFormat]=useState("9max");
  const [tab,setTab]=useState("preflop");
  const [r1,setR1]=useState("A"),[s1,setS1]=useState("s");
  const [r2,setR2]=useState("K"),[s2,setS2]=useState("d");
  const hero=useMemo(()=>[r1+s1,r2+s2],[r1,s1,r2,s2]);
  const sameCard=r1+s1===r2+s2;

  const [position,setPosition]=useState("BTN");
  const rangeSet=useMemo(()=>buildRangeSet(RFI[format][position]||[]),[format,position]);

  const [stackBB,setStackBB]=useState(10);
  const [callWidth,setCallWidth]=useState(0.2);
  const [nashResult,setNashResult]=useState(null);
  const [nashBusy,setNashBusy]=useState(false);
  const runNash=useCallback(()=>{
    if(sameCard)return;setNashBusy(true);
    setTimeout(()=>{setNashResult(pushEV(hero,stackBB,callWidth));setNashBusy(false);},20);
  },[hero,stackBB,callWidth,sameCard]);

  const [boardStr,setBoardStr]=useState("");
  const [oppCount,setOppCount]=useState(1);
  const [eqResult,setEqResult]=useState(null);
  const [eqBusy,setEqBusy]=useState(false);
  const parseBoard=(str)=>{const m=str.trim().toUpperCase().match(/([2-9TJQKA][SHDC])/g)||[];return m.map(c=>c[0]+c[1].toLowerCase());};
  const runEquity=useCallback(()=>{
    if(sameCard)return;
    const board=parseBoard(boardStr);
    const known=new Set([...hero,...board]);
    if(known.size!==hero.length+board.length){setEqResult({error:"Повтор карты в руке/борде"});return;}
    if(board.length===1||board.length===2){setEqResult({error:"Борд: 0, 3, 4 или 5 карт"});return;}
    setEqBusy(true);
    setTimeout(()=>{setEqResult({eq:equityMC(hero,oppCount,board,4000),board});setEqBusy(false);},20);
  },[hero,boardStr,oppCount,sameCard]);

  const positions=POSITIONS;
  const heroHandKey=handKey(r1,r2,s1===s2);
  const inRange=r1===r2?rangeSet.has(r1+r2):rangeSet.has(heroHandKey);

  return (
    <div className="wrap">
      <div className="head">
        <h1>MTT <span style={{color:"var(--brass)"}}>GTO</span> Тренажёр</h1>
        <div className="fmtbox">
          {["9max","6max"].map(f=>(
            <button key={f} className={"fmtbtn"+(format===f?" active":"")} onClick={()=>setFormat(f)}>{f==="9max"?"8/9-max":"6-max"}</button>
          ))}
        </div>
      </div>
      <p className="sub">Турнирный тренажёр для разбора между сессиями. Префлоп, push/fold и эквити считаются честно и работают офлайн.</p>

      <div className="card">
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
          <span className="lbl" style={{margin:0}}>Твоя рука</span>
          <span style={{fontSize:22}}><CardPip card={r1+s1}/> <CardPip card={r2+s2}/></span>
        </div>
        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
          {[[r1,setR1,s1,setS1],[r2,setR2,s2,setS2]].map(([rv,setRv,sv,setSv],idx)=>(
            <div key={idx} style={{display:"flex",gap:6}}>
              <select value={rv} onChange={e=>setRv(e.target.value)}>{RANKS.slice().reverse().map(r=><option key={r} value={r}>{r==="T"?"10":r}</option>)}</select>
              <select value={sv} onChange={e=>setSv(e.target.value)} style={{color:SUIT_COLOR[sv]}}>{SUITS.map(s=><option key={s} value={s} style={{color:"#000"}}>{SUIT_SYM[s]}</option>)}</select>
            </div>
          ))}
        </div>
        {sameCard&&<div style={{color:"var(--red)",fontSize:12,marginTop:8}}>Это одна и та же карта — поменяй масть или ранг.</div>}
      </div>

      <div className="tabs">
        {[["preflop","Префлоп-чарт"],["nash","Push/Fold"],["equity","Эквити"],["review","ИИ-разбор"]].map(([id,label])=>(
          <button key={id} className={"tab"+(tab===id?" active":"")} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {tab==="preflop"&&(
        <div className="card">
          <div className="row">
            <div className="lbl">Позиция</div>
            <div style={{display:"flex",flexWrap:"wrap"}}>
              {positions.map(p=><button key={p} className={"chip"+(position===p?" active":"")} onClick={()=>setPosition(p)}>{p}</button>)}
            </div>
          </div>
          <div style={{marginTop:14}}><RangeMatrix rangeSet={rangeSet} hero={[r1,r2,s1===s2]}/></div>
          <div className="result" style={{background:inRange?"rgba(91,191,138,.1)":"rgba(214,88,74,.1)",border:"1px solid "+(inRange?"var(--green)":"var(--red)"),fontSize:14}}>
            <b className="mono">{heroHandKey}</b> с позиции {position}:{" "}
            {inRange?<span style={{color:"var(--green)"}}>в диапазоне открытия — рейзить (open-raise).</span>:<span style={{color:"var(--red)"}}>вне диапазона открытия — фолд первым в банк.</span>}
            <div style={{color:"var(--muted)",fontSize:12,marginTop:6}}>RFI-диапазон, глубокий стэк ~20+ BB. Приближение солвера, не побитовая выгрузка.</div>
          </div>
        </div>
      )}

      {tab==="nash"&&(
        <div className="card">
          <p className="sub" style={{marginTop:0}}>Для коротких стэков (≤15 BB) главное решение — пуш или фолд. Считаю EV олл-ина против оценочного колл-диапазона. Практический ориентир, не полный фикс-пойнт Нэша.</p>
          <div className="row"><div className="lbl">Эфф. стэк: {stackBB} BB</div><input type="range" min={3} max={25} value={stackBB} onChange={e=>setStackBB(+e.target.value)}/></div>
          <div className="row"><div className="lbl">Как часто коллируют: {Math.round(callWidth*100)}% рук</div><input type="range" min={5} max={60} value={Math.round(callWidth*100)} onChange={e=>setCallWidth(e.target.value/100)}/></div>
          <button className="cta" onClick={runNash} disabled={sameCard||nashBusy}>{nashBusy?"Считаю…":"Рассчитать пуш"}</button>
          {nashResult&&(
            <div className="result" style={{background:nashResult.ev>0?"rgba(91,191,138,.1)":"rgba(214,88,74,.1)",border:"1px solid "+(nashResult.ev>0?"var(--green)":"var(--red)")}}>
              <div className="mono" style={{fontSize:18,fontWeight:700,color:nashResult.ev>0?"var(--green)":"var(--red)"}}>{nashResult.ev>0?"PUSH ▲":"FOLD ▼"} · EV {nashResult.ev>=0?"+":""}{nashResult.ev.toFixed(2)} BB</div>
              <div style={{color:"var(--muted)",fontSize:13,marginTop:6}}>Эквити олл-ина против коллера: {(nashResult.eq*100).toFixed(1)}%. EV относительно фолда (0 BB). Плюс → пуш выгоден.</div>
              <div style={{color:"var(--muted)",fontSize:12,marginTop:8,fontStyle:"italic"}}>Без учёта ICM. На баббле порог пуша строже.</div>
            </div>
          )}
        </div>
      )}

      {tab==="equity"&&(
        <div className="card">
          <div className="row"><div className="lbl">Борд (необязательно)</div><input type="text" value={boardStr} onChange={e=>setBoardStr(e.target.value)} placeholder="напр. Qh 7s 2c"/></div>
          <div className="row"><div className="lbl">Оппонентов: {oppCount}</div><input type="range" min={1} max={8} value={oppCount} onChange={e=>setOppCount(+e.target.value)}/></div>
          <button className="cta" onClick={runEquity} disabled={sameCard||eqBusy}>{eqBusy?"Симулирую…":"Посчитать эквити"}</button>
          {eqResult&&eqResult.error&&<div style={{color:"var(--red)",fontSize:13,marginTop:12}}>{eqResult.error}</div>}
          {eqResult&&eqResult.eq!=null&&(
            <div className="result" style={{background:"var(--felt)",border:"1px solid var(--line)"}}>
              <div className="mono" style={{fontSize:26,fontWeight:700,color:"var(--brass)"}}>{(eqResult.eq*100).toFixed(1)}%</div>
              <div style={{color:"var(--muted)",fontSize:13,marginTop:4}}>Шанс выиграть против {oppCount} случайн. рук{eqResult.board.length?" на борде "+eqResult.board.map(c=>c[0]==="T"?"10"+c[1]:c).join(" "):" до флопа"}. Монте-Карло, 4000 раздач — ±1%.</div>
            </div>
          )}
        </div>
      )}

      {tab==="review"&&(
        <div className="card">
          <div className="result" style={{background:"var(--felt)",border:"1px solid var(--line)",marginTop:0}}>
            <div style={{fontWeight:700,marginBottom:8}}>ИИ-разбор недоступен в офлайн-версии</div>
            <div style={{color:"var(--muted)",fontSize:13,lineHeight:1.6}}>
              Этот слой требует подключения к языковой модели и работает только внутри интерфейса Claude, не в локальном файле.
              Три остальных инструмента — префлоп-чарт, push/fold и эквити — работают здесь полностью офлайн.
              <br/><br/>
              Для разбора отыгранной раздачи открой приложение через Claude и опиши спот текстом там.
            </div>
          </div>
        </div>
      )}

      <div className="foot">
        Тренажёр для разбора своих рук между сессиями. Префлоп-диапазоны — приближение солверных RFI; push/fold и эквити считаются честно. Это инструмент обучения, не подсказчик в реальной игре.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
